pre-commit:
  parallel: true
  commands:
    fmt:
      run: cargo fmt --check
    clippy:
      run: cargo clippy --all-targets -- -D warnings

commit-msg:
  commands:
    conventional:
      run: >
        grep -qE '^(feat|fix|refactor|perf|test|docs|build|ci|chore|style|revert)(\(.+\))?!?: .+'
        {1} || (echo "commit fora do padrão Conventional Commits: type(scope): resumo" && exit 1)
