[workspace]
publish = true
git_release_enable = false
git_tag_name = "v{{ version }}"
changelog_update = true

# Mirrored from cliff.toml — release-plz does not read cliff.toml (deprecated
# changelog_config). Keep both in sync when changing commit grouping or templates.
# cliff.toml remains for local `just changelog` preview.
[changelog]
header = "# Changelog\n"
body = """
## {{ version | default(value="unreleased") }}{% if timestamp %} - {{ timestamp | date(format="%Y-%m-%d") }}{% endif %}
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group }}
{% for commit in commits %}- {{ commit.message | upper_first }}
{% endfor %}{% endfor %}
"""
commit_parsers = [
  { message = "^feat", group = "Features" },
  { message = "^fix", group = "Fixes" },
  { message = "^perf", group = "Performance" },
  { message = "^docs", group = "Docs" },
  { message = "^refactor|^test|^build|^ci|^chore|^style", group = "Internals" },
]
