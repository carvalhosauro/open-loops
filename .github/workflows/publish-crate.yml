# Publishes the `open-loops` crate to crates.io on a version tag.
#
# cargo-dist 0.32 does NOT publish to crates.io (binaries, installers and
# Homebrew only), so this is a dedicated workflow. See docs/distribution.md.
name: Publish crate

on:
  push:
    tags:
      - '**[0-9]+.[0-9]+.[0-9]+*'

permissions:
  contents: read

jobs:
  publish:
    name: cargo publish
    runs-on: ubuntu-latest
    # Skip prerelease tags (anything with a suffix after the patch number).
    if: ${{ !contains(github.ref_name, '-') }}
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@stable

      - name: Verify tag matches Cargo.toml version
        run: |
          tag="${GITHUB_REF_NAME#v}"
          crate_version="$(cargo metadata --no-deps --format-version 1 \
            | jq -r '.packages[] | select(.name == "open-loops") | .version')"
          echo "tag=$tag crate_version=$crate_version"
          if [ "$tag" != "$crate_version" ]; then
            echo "::error::Tag $GITHUB_REF_NAME does not match Cargo.toml version $crate_version" >&2
            exit 1
          fi

      - name: Check whether this version is already on crates.io
        id: published
        run: |
          version="$(cargo metadata --no-deps --format-version 1 \
            | jq -r '.packages[] | select(.name == "open-loops") | .version')"
          url="https://index.crates.io/op/en/open-loops"
          if curl -fsSL "$url" 2>/dev/null | jq -r '.vers' | grep -qx "$version"; then
            echo "already=true" >> "$GITHUB_OUTPUT"
            echo "Version $version already published; skipping cargo publish."
          else
            echo "already=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to crates.io
        if: ${{ steps.published.outputs.already == 'false' }}
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish --locked
